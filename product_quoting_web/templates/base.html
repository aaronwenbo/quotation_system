<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}产品报价系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">产品报价系统</div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">报价</a>
            <a href="{{ url_for('update_library') }}">更新标准库</a>
            <a href="{{ url_for('library_status') }}">标准库状态</a>
            <a href="{{ url_for('search_price') }}">价格查询</a>
        </div>
    </nav>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>产品报价系统 v1.0</p>
    </footer>
</body>
</html>
